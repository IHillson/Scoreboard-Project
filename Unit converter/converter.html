<html>
    <head>
        <link rel="stylesheet" href="converter.css">
    </head>
    <body>
        <div id="head-section">
            <h1 id="title">Metric/Imperial Unit Conversion</h1>
            <input type="number" id="input-el">
            <button id="convert-btn">Convert</button>
        </div>
        <div class="card">
            <p>Length (Meter/Feet)</p>
            <p class="output" id="length-output"></p>
        </div>
        <div class="card">
            <p>Volume (Liters/Gallons)</p>
            <p class="output" id="volume-output"></p>
        </div>
        <div class="card">
            <p>Mass (Kilograms/Pounds)</p>
            <p class="output" id="mass-output"></p>
        </div>
        <script src="converter.js"></script>
    </body>
</html>
