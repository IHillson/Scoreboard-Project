<html>
    <head>
        <link rel="stylesheet" href="index.css">
    </head>
    <body>
        <section>
            <div>
                <h1>Generate a <span class="text-green"><br>random password</span></h1>
                <p class="sub-heading">Never use an insecure password again.</p>
                <div>
                    <button onclick="renderPassword()" id="generate-passwords-btn">Generate Passwords</button>
                    <input type="text" min="8" max="15" id="length-value" placeholder="Change password">
                 </div>
                <div id="password-container-el">
                    <p onclick="copyToClipboard()" class="password" id="password1-el"></p>
                    <p onclick="copyToClipboard()" class="password" id="password2-el"></p>
                </div>
            </div>
            <script src="index.js"></script>
        </section>
    </body>
</html>
