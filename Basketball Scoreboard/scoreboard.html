<html>
    <head>
        <link href="http://fonts.cdnfonts.com/css/cursed-timer-ulil" rel="stylesheet">
        <link rel="stylesheet" href="scoreboard.css">
    </head>
    <body>
        <div class="container">
            <div class="team">
                <h3>HOME</h3>
                <div class="scores-box">
                    <h1 id="scores-home">0</h1>
                </div>
                <button class="add-score" onclick="add1ScoreHome()">+1</button>
                <button class="add-score" onclick="add2ScoreHome()">+2</button>
                <button class="add-score" onclick="add3ScoreHome()">+3</button>
            </div>
            <div class="team">
                <h3>AWAY</h3>
                <div class="scores-box">
                    <h1 id="scores-guest">0</h1>
                </div>
                <button class="add-score" onclick="add1ScoreGuest()">+1</button>
                <button class="add-score" onclick="add2ScoreGuest()">+2</button>
                <button class="add-score" onclick="add3ScoreGuest()">+3</button>
            </div>
        </div>
        <script src="scoreboard.js"></script>
    </body>
</html>
